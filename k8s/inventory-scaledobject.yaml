apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inventory-scaler
  namespace: order-processing

spec:
  scaleTargetRef:
    name: inventory-service

  minReplicaCount: 0
  maxReplicaCount: 5

  pollingInterval: 10
  cooldownPeriod: 30

  triggers:
  - type: solace-event-queue

    metadata:
      solaceSempBaseURL: "http://34.123.114.52:8080"
      messageVpn: "default"
      queueName: "Q.INVENTORY"
      messageCountTarget: "5"

    authenticationRef:
      name: solace-auth
