apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: order-processing

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:
      - name: order-service

        image: allan1804/order-service:v1 

        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: order-config

        - secretRef:
            name: solace-secret

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: order-processing

spec:
  selector:
    app: order-service

  ports:
  - port: 3000
    targetPort: 3000

  type: ClusterIP
